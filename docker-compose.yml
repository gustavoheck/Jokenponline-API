version: '3.8'

services:
  meu-banco:
    image: postgres:16
    container_name: postgres_container_v16
    environment:
      POSTGRES_DB: jokenponline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresPW
    ports:
      - "127.0.0.1:5433:5432"

  vault:
    image: hashicorp/vault:1.15
    container_name: spring_vault
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "heckvault"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"